// .github/workflows/deploy.yml
name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_GITHUB }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
      - name: Deploy via FTP (Hostinger)
        uses: SamKumarDev/ftp-deploy-action@v2.0.0
        with:
          ftp-server: ${{ secrets.HOSTINGER_FTP_HOST }}
          ftp-username: ${{ secrets.HOSTINGER_FTP_USER }}
          ftp-password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ./dist
          git-ftp-args: "--syncroot ."
